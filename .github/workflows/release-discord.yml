name: Notify Discord on Release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        uses: tsickert/discord-webhook@v5.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          content: "<@&1510459007071158433>"
          embed-title: "${{ github.event.release.name }}"
          embed-description: "${{ github.event.release.body }}"
          embed-url: "${{ github.event.release.html_url }}"
          embed-color: #000000
